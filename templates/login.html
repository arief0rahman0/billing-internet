<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Pembayaran Internet</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
        <div class="p-6 sm:p-8 space-y-6">
            
            <div class="text-center space-y-3">
                <div class="flex justify-center drop-shadow-sm">
                    <svg class="w-14 h-14 text-blue-600" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 10V4M12 10V2M18 10V4" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
                        <rect x="2" y="10" width="20" height="8" rx="2.5" fill="#1e3a8a" stroke="#2563eb" stroke-width="2"/>
                        <circle cx="6" cy="14" r="1" fill="#10b981"/>
                        <circle cx="10" cy="14" r="1" fill="#10b981"/>
                        <circle cx="14" cy="14" r="1" fill="#10b981"/>
                        <circle cx="18" cy="14" r="1" fill="#60a5fa"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">BILLING LOGIN</h1>
                <p class="text-sm text-gray-500">Silakan login untuk mengelola tagihan kasir</p>
            </div>

            {% if error %}
            <div class="p-4 bg-rose-50 border border-rose-200 text-rose-800 rounded-xl text-xs sm:text-sm font-bold flex items-center gap-2">
                <span>❌</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Username</label>
                    <input type="text" name="username" required placeholder="Masukkan username" 
                           class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Password</label>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 flex justify-between">
                        <span>Kode TOTP 2FA</span>
                        <span class="text-[10px] text-blue-600 normal-case font-semibold">*Buka Google Authenticator</span>
                    </label>
                    <input type="text" name="totp_code" required placeholder="Contoh: 123456" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                           class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 tracking-[0.5em] text-center font-mono font-bold text-gray-800">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-sm transition shadow-md cursor-pointer">
                    Login
                </button>
            </form>

        </div>
    </div>

</body>
</html>
