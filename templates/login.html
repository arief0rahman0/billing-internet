<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Pembayaran Internet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Logo2.png') }}">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.6s ease-in-out;
        }
    
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-[#0b0f19] text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 relative overflow-hidden transition-colors duration-300 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-100/40 via-purple-50/20 to-white dark:from-indigo-900/20 dark:via-[#0b0f19] dark:to-[#0b0f19] animate-fade-in-up">

    <!-- Theme Toggle Floating Button -->
    <button onclick="toggleTheme()" class="absolute top-6 right-6 p-3 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-md hover:shadow-lg transition-all duration-300 hover:scale-105 cursor-pointer z-50 text-slate-650 dark:text-slate-350 relative z-[100]" aria-label="Toggle Theme">
        <!-- Sun icon (visible in dark) -->
        <svg id="sun-icon" class="pointer-events-none w-4 h-4 hidden dark:block text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <!-- Moon icon (visible in light) -->
        <svg id="moon-icon" class="pointer-events-none w-4 h-4 block dark:hidden text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>

    <div class="w-full max-w-md bg-white/80 dark:bg-slate-900/60 backdrop-blur-xl rounded-2xl shadow-2xl shadow-indigo-500/10 dark:shadow-none border border-slate-200/50 dark:border-slate-800/50 overflow-hidden transition-all duration-300 z-10">
        <div class="p-8 sm:p-10 space-y-7">
            
            <!-- Logo Section -->
            <div class="text-center space-y-3">
                <div class="flex justify-center select-none">
                    <div class="p-2.5 bg-gradient-to-br from-indigo-50 to-white dark:from-indigo-500/20 dark:to-purple-500/10 rounded-2xl border border-indigo-100/50 dark:border-indigo-500/20 shadow-inner">
                        <img src="{{ url_for('static', filename='Logo1.png') }}" alt="Logo" class="h-14 w-auto object-contain">
                    </div>
                </div>
                <div class="space-y-1">
                    <h2 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">Billing Internet</h2>
                </div>
            </div>

            <!-- Flash Error Message -->
            {% if error %}
            <div class="p-3.5 bg-slate-100 dark:bg-slate-900 border border-rose-500/20 text-slate-800 dark:text-rose-450 rounded-xl text-xs sm:text-sm font-semibold flex items-center gap-2.5 animate-shake">
                <span class="w-2 h-2 rounded-full bg-rose-500 shrink-0"></span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="/login" class="space-y-4">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <!-- Username -->
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Username</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400 group-focus-within:text-slate-900 dark:group-focus-within:text-white transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </span>
                        <input type="text" name="username" required placeholder="Masukkan username" 
                               class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-850 rounded-xl py-2.5 pl-10 pr-3.5 text-xs focus:outline-none focus:ring-1 focus:ring-slate-400 dark:focus:ring-slate-700 focus:border-slate-400 dark:focus:border-slate-700 transition-all placeholder-slate-400 dark:placeholder-slate-650">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Password</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400 group-focus-within:text-slate-900 dark:group-focus-within:text-white transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                        <input type="password" name="password" required placeholder="••••••••" 
                               class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-850 rounded-xl py-2.5 pl-10 pr-3.5 text-xs focus:outline-none focus:ring-1 focus:ring-slate-400 dark:focus:ring-slate-700 focus:border-slate-400 dark:focus:border-slate-700 transition-all placeholder-slate-400 dark:placeholder-slate-650">
                    </div>
                </div>

                <!-- TOTP 2FA -->
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider flex justify-between">
                        <span>Kode Keamanan 2FA</span>
                    </label>
                    <div class="relative group">
                        <input type="text" name="totp_code" required placeholder="000000" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                               class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-850 rounded-xl py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-slate-400 dark:focus:ring-slate-700 focus:border-slate-400 dark:focus:border-slate-700 transition-all tracking-[0.5em] text-center font-mono font-bold text-slate-800 dark:text-slate-100 placeholder-slate-300 dark:placeholder-slate-750">
                    </div>
                </div>

                <button type="submit" class="w-full mt-2 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white shadow-lg shadow-indigo-500/30 border-none font-bold py-3 px-4 rounded-xl text-xs transition cursor-pointer flex items-center justify-center gap-1.5">
                    Masuk ke Dashboard
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>

        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
</body>
</html>
